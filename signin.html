<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sign In - Boholweb</title>
  <meta name="description" content="Sign in to your Boholweb account to manage your website security and maintenance plans.">
  <meta name="keywords" content="Boholweb sign in, login">

  <!-- Favicons -->
  <link href="assets/img/fav.jpg" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>

<body class="auth-page">

  <main class="auth-signin">

    <a href="index.html" class="auth-logo-lockup text-decoration-none">
      <img src="assets/img/logo.webp" alt="boholWeb">
    </a>

    <div class="auth-card">

      <a href="#" class="auth-btn google">
        <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Continue with Google
      </a>

      <a href="#" class="auth-btn linkedin">
        <i class="bi bi-linkedin"></i> Continue with LinkedIn
      </a>

      <a href="#" class="auth-btn facebook">
        <i class="bi bi-facebook"></i> Continue with Facebook
      </a>

      <div class="auth-divider">or sign in with email</div>

      <form action="#" method="post">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>

        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>

        <div class="auth-row-between">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
        </div>

        <div class="auth-forgot-login">
          <a href="#">Forgot your password?</a>
          <button type="submit" class="btn-login">LOG IN</button>
        </div>
      </form>

      <p class="auth-2fa-note">🔒 If 2FA is enabled on your account, you'll be prompted after sign in.</p>
    </div>

    <p class="auth-switch-bottom">Don't have an account? <a href="signup.html">Sign up free</a></p>

  </main>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>

</html>
